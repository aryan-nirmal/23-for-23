name: turf_booking
description: "TurfBook - Book sports turfs instantly. A marketplace for turf owners and players."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # Supabase (free tier)
  supabase_flutter: ^2.5.6

  # UI / Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  table_calendar: ^3.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  # Storage
  shared_preferences: ^2.2.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
